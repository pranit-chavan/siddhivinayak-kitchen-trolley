services:
  - type: web
    name: siddhivinayak-kitchen-trolley-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate --schema=../database/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=../database/schema.prisma && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
